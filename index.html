<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnPulse</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:url('https://images.unsplash.com/photo-1521791136064-7986c2920216?w=1200') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
}

.container{
position:relative;
z-index:1;
text-align:center;
color:#fff;
padding:30px;
max-width:420px;
}

.logo{
font-size:42px;
font-weight:700;
margin-bottom:20px;
}

.logo span{
color:#00e676;
}

h1{
font-size:34px;
margin-bottom:15px;
}

p{
font-size:16px;
line-height:1.6;
color:#eee;
margin-bottom:35px;
}

.btn{
display:inline-block;
padding:15px 40px;
background:#00e676;
color:#000;
text-decoration:none;
font-weight:700;
border-radius:50px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
background:#00c853;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">Earn<span>Pulse</span></div>

<h1>Start Earning with EarnPulse</h1>

<p>
Complete simple surveys, earn real rewards, and get paid securely anytime.
</p>

<a href="register.html" class="btn">Get Started</a>

</div>

</body>
</html>
