<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnPulse - Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:url('https://images.unsplash.com/photo-1521791136064-7986c2920216?w=1600') center/cover fixed no-repeat;
min-height:100vh;
padding:20px;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.60);
}

.container{
position:relative;
z-index:1;
max-width:850px;
margin:auto;
}

.profile-card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:30px;
text-align:center;
color:#fff;
margin-bottom:20px;
}

.avatar{
width:110px;
height:110px;
margin:auto;
border-radius:50%;
background:#00e676;
display:flex;
align-items:center;
justify-content:center;
font-size:45px;
font-weight:bold;
color:#000;
margin-bottom:15px;
}

.profile-card h2{
margin-bottom:5px;
}

.profile-card p{
color:#ddd;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:18px;
padding:20px;
text-align:center;
color:#fff;
}

.card h3{
color:#00e676;
margin-top:10px;
}

.info{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:25px;
color:#fff;
}

.row{
display:flex;
justify-content:space-between;
padding:14px 0;
border-bottom:1px solid rgba(255,255,255,.15);
}

button{
width:100%;
margin-top:25px;
padding:15px;
border:none;
border-radius:30px;
background:#00e676;
color:#000;
font-size:17px;
font-weight:700;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="profile-card">

<div class="avatar">M</div>

<h2>Mordecai</h2>

<p>EarnPulse Member</p>

</div>

<div class="stats">

<div class="card">
<p>Completed Surveys</p>
<h3>48</h3>
</div>

<div class="card">
<p>Total Earnings</p>
<h3>KES 2,450</h3>
</div>

<div class="card">
<p>Referral Friends</p>
<h3>12</h3>
</div>

</div>

<div class="info">

<div class="row">
<span>📧 Email</span>
<span>user@example.com</span>
</div>

<div class="row">
<span>📱 Phone</span>
<span>+254 7XX XXX XXX</span>
</div>

<div class="row">
<span>📍 Country</span>
<span>Kenya</span>
</div>

<div class="row">
<span>⭐ Membership</span>
<span>Premium</span>
</div>

<div class="row">
<span>📅 Joined</span>
<span>22 Jul 2026</span>
</div>

<button>Edit Profile</button>

</div>

</div>

</body>
  </html>
