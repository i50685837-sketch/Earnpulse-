<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnPulse - Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1521791136064-7986c2920216?w=1200') center/cover no-repeat;
background-size:cover;
background-position:center;
position:relative;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
}

.register-box{
position:relative;
z-index:1;
width:90%;
max-width:420px;
padding:35px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:20px;
text-align:center;
}

h1{
color:#fff;
margin-bottom:10px;
}

p{
color:#ddd;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:15px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#00e676;
color:#000;
font-size:16px;
font-weight:700;
border:none;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#00c853;
}

.login{
margin-top:20px;
color:#fff;
}

.login a{
color:#00e676;
text-decoration:none;
font-weight:600;
}
</style>

</head>
<body>

<div class="register-box">

<h1>Create Account</h1>

<p>Join EarnPulse and start earning today.</p>

<form action="dashboard.html">

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="tel" placeholder="Phone Number" required>

<input type="password" placeholder="Password" required>

<input type="password" placeholder="Confirm Password" required>

<button type="submit">Create Account</button>

</form>

<div class="login">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

</body>
</html>
