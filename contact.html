<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnPulse - Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:url('https://images.unsplash.com/photo-1521791136064-7986c2920216?w=1600') center/cover fixed no-repeat;
min-height:100vh;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
}

.container{
position:relative;
z-index:1;
max-width:650px;
margin:30px auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:25px;
color:#fff;
}

.logo{
text-align:center;
font-size:34px;
font-weight:700;
color:#00e676;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#ddd;
margin-bottom:25px;
}

.contact-box{
background:rgba(255,255,255,.12);
padding:18px;
border-radius:15px;
margin:15px 0;
display:flex;
align-items:center;
gap:15px;
}

.icon{
font-size:28px;
}

.contact-box h3{
margin-bottom:5px;
}

.form input,
.form textarea{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
outline:none;
font-size:15px;
}

.form textarea{
height:120px;
resize:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#00e676;
color:#000;
font-size:17px;
font-weight:700;
cursor:pointer;
}

.social{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.social div{
background:rgba(255,255,255,.12);
padding:15px;
text-align:center;
border-radius:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
EarnPulse
</div>

<p class="subtitle">
Need help? Contact our support team.
</p>


<div class="contact-box">

<div class="icon">📧</div>

<div>
<h3>Email</h3>
<p>support@earnpulse.com</p>
</div>

</div>


<div class="contact-box">

<div class="icon">📱</div>

<div>
<h3>Phone</h3>
<p>+254 700 000 000</p>
</div>

</div>


<div class="contact-box">

<div class="icon">💬</div>

<div>
<h3>Live Support</h3>
<p>Available 24/7</p>
</div>

</div>


<h2 style="margin-top:25px;">
Send Message
</h2>


<div class="form">

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea placeholder="Write your message..."></textarea>

<button>
Send Message
</button>

</div>


<div class="social">

<div>
🌐<br>
Website
</div>

<div>
📘<br>
Facebook
</div>

<div>
🐦<br>
Twitter
</div>

</div>


</div>

</div>

</body>
  </html>
